<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="OSS showcases, methodology pieces, and reference material from Keith McDonnell's independent AI-engineering assessment practice.">
<title>Analysis — Keith McDonnell</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF8F2; --panel:#EFEBE2; --hair:#DBD6CB; --ink:#1A1813; --body:#3f3d36; --muted:#6B6458;
    --link:#0B57D0; --link-hover:#0842A0; --link-visited:#6B3FA0;
    --sans:"IBM Plex Sans",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--body);font-family:var(--sans);line-height:1.65;font-size:18px}
  h1,h2,h3{color:var(--ink);line-height:1.18;letter-spacing:-.01em;font-weight:600}
  strong{color:var(--ink);font-weight:600}
  .wrap{max-width:780px;margin:0 auto;padding:0 28px}
  a{color:var(--link);text-decoration:underline;text-underline-offset:2px}
  a:hover{color:var(--link-hover)}
  a:visited{color:var(--link-visited)}

  .page-back{padding:20px 0;border-bottom:1px solid var(--hair)}
  .page-back a{font-size:14px;text-decoration:none;color:var(--muted)}
  .page-back a:hover{color:var(--ink);text-decoration:underline}

  .page-header{padding:46px 0 32px}
  .page-header h1{font-size:clamp(26px,4vw,36px);margin:0 0 12px}
  .page-header p{font-size:17px;color:var(--muted);max-width:60ch;margin:0}

  .analysis-list{padding:0 0 60px}
  .analysis-item{padding:28px 0;border-top:1px solid var(--hair)}
  .analysis-item:last-child{border-bottom:1px solid var(--hair)}
  .analysis-item--soon{opacity:.6}
  .analysis-meta{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:0 0 8px}
  .analysis-meta .stage{border:1px solid var(--hair);border-radius:3px;padding:1px 5px;margin-right:8px}
  .analysis-item h3{font-size:20px;margin:0 0 8px}
  .analysis-item h3 a{text-decoration:none;color:var(--ink)}
  .analysis-item h3 a:hover{text-decoration:underline}
  .analysis-desc{font-size:16px;color:var(--muted);margin:0;max-width:64ch}
  .analysis-empty{color:var(--muted);padding:40px 0}

  footer{border-top:1px solid var(--hair);padding:32px 0 56px;font-size:14px;color:var(--muted)}
  footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px}

  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<div class="page-back">
  <div class="wrap"><a href="/">← Keith McDonnell</a></div>
</div>

<main>
  <div class="wrap">
    <header class="page-header">
      <h1><!-- BUILD:TITLE --></h1>
      <p><!-- BUILD:INTRO --></p>
    </header>
    <div class="analysis-list">
      <!-- BUILD:ANALYSIS_LIST -->
    </div>
  </div>
</main>

<footer>
  <div class="wrap">
    <div>Keith McDonnell · Independent verdict on AI coding</div>
    <div><a href="/">keithmcdonnell.net</a></div>
  </div>
</footer>

</body>
</html>
