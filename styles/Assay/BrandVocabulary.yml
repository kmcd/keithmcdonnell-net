# Enforce the service name and tool vocabulary settled in the brand doctrine.
# "verdict" is the product word — not report, audit, or review.
# Only flag when "report" is used as the name of our specific deliverable,
# not as a generic word (vendor reports, metrics reports, etc.).
extends: existence
message: "Brand vocabulary: '%s' — use 'verdict' for the Assay deliverable. See CLAUDE.md."
level: warning
ignorecase: true
tokens:
  - '\bthe\s+(?:assessment|Assay|independent)\s+report\b'
  - '\bdeliver(?:s|ed|ing)?\s+a\s+report\b'
  - '\bwritten\s+report\b'
  - '\breceive\s+(?:a|the)\s+report\b'
